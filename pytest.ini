[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Treat unknown marks as errors (catches typos like @pytest.mark.smoek)
addopts = --strict-markers -m "not discord_integration"
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    discord_integration: requires a live Discord connection and DISCORD_TEST_CHANNEL_ID (never runs in CI)
