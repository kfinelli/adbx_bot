# data/strings.yaml — Player-facing strings for the Async Dungeon Crawler bot.
#
# Access via engine/strings.py:
#   from engine.strings import get_string, fmt_string
#   get_string("errors.no_session")
#   fmt_string("combat.log.attack_hit", actor_name="Alice", target_name="Goblin", ...)
#
# Placeholders use Python {key} format syntax.
#
# LENGTH VALIDATION (enforced at startup by engine/strings.py):
#   Key suffix determines the Discord character limit that is checked on load.
#   You MUST follow these naming conventions or the limit will not be enforced:
#
#     *.label        — 80 chars (button label); 45 chars for modal TextInput labels
#                      (modal TextInput label keys are listed explicitly in _KEY_LIMITS
#                       in engine/strings.py — add new ones there when needed)
#     *.placeholder  — 100 chars (TextInput / Select placeholder)
#     *.description  — 100 chars (also used as TextInput placeholder in modals)
#
#   If you add a new string that feeds into a Discord UI element, name its key
#   with the appropriate suffix above so the limit is caught at startup rather
#   than as a 400 from the Discord API at runtime.

